---
# nplayer-setup.yaml — Aethelgard v0.11 player-setup flow.
#
# Per M_V11.PURGE, the N-player FFA picker + age-of-strata mode
# were stripped (RTS commitment). v0.11 ships ONLY 2-faction RTS
# modes. This flow now drives the simpler player setup: launcher
# → Forge Your Realm → faction-colors-row picker → Begin Match
# → onboarding overlay.
appId: com.arcadecabinet.aethelgard
---
- launchApp
- tapOn:
    id: "menu-new-game"
- assertVisible:
    text: "Forge Your Realm"

# The Players section uses a faction-colors-row to pick the
# player + enemy banner colors (replaces the prior N-player slider).
- assertVisible:
    id: "faction-colors-row"

# Confirm Begin Match CTA is reachable.
- assertVisible:
    id: "begin-game"
- tapOn:
    id: "begin-game"

# Onboarding overlay should appear over the freshly-started game.
- assertVisible:
    id: "onboarding-overlay"
