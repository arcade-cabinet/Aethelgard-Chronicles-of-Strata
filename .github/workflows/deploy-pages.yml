name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege at the workflow level: only need read on contents.
# Job-level perms grant pages/id-token only to the job that uses them.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + deploy GitHub Pages
    # Job-scoped least-privilege grants — pages + id-token live HERE,
    # not at the workflow level, so unrelated jobs (if added later) don't
    # silently inherit them.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # persist-credentials: false avoids storing the GITHUB_TOKEN in the
        # local git config — defends against later steps accidentally leaking
        # it (e.g. via a third-party action that reads .git/config).
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # public/assets/ is committed — no ingest step needed.
      - run: pnpm build:pages
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with: { path: dist }
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
