name: release-please

# M_AUDIT2.SEC2.19 — release-please runs on every push to main and
# maintains the "release PR" that, when merged, cuts the next tagged
# version. Tag creation then fans out to release.yml (signed APK +
# SBOM) and cd.yml (deploy what release.yml produced).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
