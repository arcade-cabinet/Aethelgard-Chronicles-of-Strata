name: Release

# Standard arcade-cabinet trio: ci.yml (PR gates) → release.yml (cuts
# a tag via release-please then builds signed APK + SBOM + Sigstore
# attestation on tag publish) → cd.yml (deploys what release.yml
# produced + Pages on push to main).
#
# release-please opens / maintains a "release PR" on every push to
# main; when that PR merges, the release-please action cuts the tag
# AND triggers the build-and-sign job in the same workflow run via
# the release_created output. The legacy release-please.yml is gone.

on:
  push:
    branches: [main]
  release:
    types: [published]

# Workflow-level grants are minimal; each job overrides with the
# subset it actually needs (zizmor / CodeRabbit least-privilege fix).
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # release-please updates CHANGELOG + cuts tags
      pull-requests: write  # release-please opens / updates the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-sign:
    name: Build + sign release APK
    # Run on tag publish (release event) — release-please cuts the
    # release as a side-effect of merging the release PR; the published
    # tag fires the release event which fans out to this job.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload release assets
      id-token: write       # Sigstore keyless signing
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      # --- toolchain --------------------------------------------------------
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile

      # --- web build + cap sync --------------------------------------------
      - run: pnpm build
      - run: pnpm exec cap add android || true
      - run: pnpm cap:sync

      # --- decode keystore from secrets ------------------------------------
      - name: Decode signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_B64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_SIGNING_KEYSTORE_B64" ]; then
            echo "ANDROID_SIGNING_KEYSTORE_B64 secret missing — release build cannot sign." >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/sign"
          echo "$ANDROID_SIGNING_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/sign/release.keystore"
          echo "ANDROID_SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/sign/release.keystore" >> "$GITHUB_ENV"

      # --- assemble signed release APK -------------------------------------
      - name: Assemble signed release APK
        env:
          ANDROID_SIGNING_KEY_ALIAS:      ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD:   ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: cd android && ./gradlew assembleRelease

      # Shred keystore + drop env-var path AS SOON AS signing is done.
      - name: Shred signing keystore (early)
        run: |
          if command -v shred >/dev/null 2>&1; then
            shred -uz "$RUNNER_TEMP/sign/release.keystore" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/sign/release.keystore"
          echo "ANDROID_SIGNING_KEYSTORE_PATH=" >> "$GITHUB_ENV"

      # Guard exact APK filename before attestation.
      - name: Verify exactly one signed APK exists
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "Expected exactly one signed APK at $APK; not found." >&2
            ls -la android/app/build/outputs/apk/release/ >&2 || true
            exit 1
          fi
          if ls android/app/build/outputs/apk/release/*-unsigned.apk 2>/dev/null; then
            echo "Refusing to attest: unsigned APK variant present." >&2
            exit 1
          fi

      # --- SBOM (M_AUDIT2.SEC2.35) -----------------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm@4.2.1 \
            --output-format JSON \
            --output-file sbom.cdx.json

      # --- Sigstore attestation over apk + sbom ----------------------------
      # Reviewer-fix: subject-path now uses the exact APK filename
      # verified above instead of a glob. Removes the silent-attest-zero
      # failure mode if Gradle renames its output.
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v3.0.0
        with:
          subject-path: |
            android/app/build/outputs/apk/release/app-release.apk
            sbom.cdx.json

      # --- upload assets to the release -----------------------------------
      - name: Upload APK + SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            android/app/build/outputs/apk/release/app-release.apk \
            sbom.cdx.json \
            --clobber

      # --- shred the keystore (backstop) ---------------------------------
      - if: always()
        run: rm -f "$RUNNER_TEMP/sign/release.keystore"
