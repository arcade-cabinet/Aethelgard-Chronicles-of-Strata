name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm check
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      # No asset ingest on CI — public/assets/ is committed. The committed
      # manifest is validated against the committed files by the unit suite
      # (tests/unit/asset-manifest.test.ts).
      - name: Unit tests
        run: pnpm test
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser tests
        run: pnpm test:browser
      - name: Build web
        run: pnpm build
      - name: Build GitHub Pages
        run: pnpm build:pages
      - name: E2E tests
        run: pnpm test:e2e
      # M_SEC.16 — skip artifact upload on fork PRs. Fork PRs run
      # against attacker-controlled code; uploading playwright-report/
      # or test-results/ could exfiltrate secrets injected into the
      # report (e.g. env-leaking screenshots). Maintainer PRs (same
      # repo) still upload on failure.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: test-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  dependency-review:
    name: Dependency review (M_SEC.17)
    # Block dep changes that introduce known-vulnerable packages.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (M_SEC.17)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  android-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # public/assets/ is committed — no ingest step needed.
      - name: Add Android platform
        run: pnpm exec cap add android
      - name: Build and sync Capacitor
        run: pnpm cap:sync
      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
