name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # M_AUDIT2.SEC2.13 — fail PRs that introduce HIGH/CRITICAL dep CVEs.
      # `--prod` scopes to runtime deps only; devDeps are caught separately
      # by dependency-review on PR diff.
      - name: pnpm audit (prod, high+)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: false
      # M_AUDIT2.SEC2.49 — verify lockfile matches package.json. A
      # hand-edited package.json with forgotten lockfile update would
      # silently float deps when --frozen-lockfile flips to install
      # mode in a downstream pipeline.
      - name: Lockfile is in sync with package.json
        run: |
          pnpm install --lockfile-only
          git diff --exit-code pnpm-lock.yaml
      - name: Typecheck
        run: pnpm check
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      # No asset ingest on CI — public/assets/ is committed. The committed
      # manifest is validated against the committed files by the unit suite
      # (tests/unit/asset-manifest.test.ts).
      - name: Unit tests
        run: pnpm test
      # M_AUDIT2.SEC2.21 — skip Playwright deps install on fork PRs.
      # Browser tests run an attacker-controlled bundle inside a real
      # Chromium; the install step is expensive (CI minutes) and the
      # browser test surface itself could be weaponised. Maintainer
      # PRs (same repo) still run the full browser suite.
      - name: Install Playwright (maintainer PRs + push only)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser tests (maintainer PRs + push only)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: pnpm test:browser
      - name: Build web
        run: pnpm build
      - name: Build GitHub Pages
        run: pnpm build:pages
      # M_AUDIT2.SEC2.22 — vite-static-assets-plugin writes src/static-
      # assets.ts at build time. A supply-chain attacker who landed a
      # malicious plugin update could inject code via this file. Diff
      # check fails CI if the build produced a tree-different output
      # than was committed.
      #
      # CONSTRAINT: build steps above MUST NOT modify public/. Both
      # `pnpm build` and `pnpm build:pages` regenerate static-assets.ts
      # from public/; any build step that writes into public/ would
      # cause the second run to diverge from the committed file and
      # produce a spurious CI failure (reviewer finding).
      - name: Static assets file is deterministic
        run: git diff --exit-code src/static-assets.ts
      # M_AUDIT2.SEC2.44 — defense-in-depth post-CSP: no contributor
      # may add cross-origin script/style/font/image references to
      # index.html. The CSP `default-src 'self'` would block them at
      # runtime; this fails the PR at CI so the policy intent is
      # version-controlled.
      - name: No third-party origins in index.html
        run: |
          if grep -nE 'https?://' index.html; then
            echo "::error::index.html contains a cross-origin URL — CSP forbids this. Self-host the asset."
            exit 1
          fi
      - name: E2E tests
        run: pnpm test:e2e
      # M_SEC.16 — skip artifact upload on fork PRs. Fork PRs run
      # against attacker-controlled code; uploading playwright-report/
      # or test-results/ could exfiltrate secrets injected into the
      # report (e.g. env-leaking screenshots). Maintainer PRs (same
      # repo) still upload on failure.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        with:
          name: test-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  dependency-review:
    name: Dependency review (M_SEC.17)
    # Block dep changes that introduce known-vulnerable packages.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # M_AUDIT2.SEC2.15 — SHA-pinned (GitHub OpenSSF best practice).
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (M_SEC.17)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # M_AUDIT2.SEC2.15 — SHA-pinned to v3 stable.
      - uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3

  android-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    # M_AUDIT2.SEC2.17 — explicit job-level permissions block (defense
    # in depth; workflow-level read can be overridden by a future
    # contributor without anyone noticing).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      # public/assets/ is committed — no ingest step needed.
      - name: Add Android platform
        run: pnpm exec cap add android
      - name: Build and sync Capacitor
        run: pnpm cap:sync
      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          # M_AUDIT2.SEC2.18 — cap retention at 7 days. Debug APKs are
          # signed with the predictable Android debug keystore; 90-day
          # default retention on a public repo is a re-signing surface.
          retention-days: 7
